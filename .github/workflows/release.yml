name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build mod jar
        run: ./gradlew build

      - name: Get mod version
        id: version
        run: |
          VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          MC=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)
          echo "mod_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "mc_version=$MC" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CoA Display v${{ steps.version.outputs.mod_version }} (MC ${{ steps.version.outputs.mc_version }})"
          files: build/libs/coa-display-*.jar
          generate_release_notes: true
